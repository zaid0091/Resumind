services:
  - type: web
    name: resumind-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    preDeployCommand: python manage.py migrate --noinput
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DB_NAME
        fromDatabase:
          name: resumind-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: resumind-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: resumind-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: resumind-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: resumind-db
          property: port
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend-domain.vercel.app"

databases:
  - name: resumind-db
    databaseName: resumind
    plan: free
